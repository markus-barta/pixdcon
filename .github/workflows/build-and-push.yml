name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  build:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to push to GHCR

    env:
      # Node.js 20 is being removed from the runner on 2026-09-16 and forced
      # to Node 24 on 2026-06-02. Opt in early so we don't get surprise
      # behavior changes — and so the deprecation warnings stop spamming
      # every build log. Docker actions (@v3/@v5/@v6) and checkout@v5 all
      # natively support Node 24, so this env var is belt-and-braces.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/markus-barta/pixdcon
          tags: |
            # latest on every push to main
            type=raw,value=latest,enable={{is_default_branch}}
            # semver tags: v0.1.0 → 0.1.0 + 0.1 + 0
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # short sha for traceability
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between runs for faster builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
