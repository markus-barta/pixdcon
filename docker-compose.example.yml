services:
  pixdcon:
    image: ghcr.io/markus-barta/pixdcon:latest
    container_name: pixdcon
    network_mode: host
    restart: unless-stopped
    environment:
      - TZ=Europe/Vienna
      - PIXDCON_CONFIG_PATH=/data/config.json
    volumes:
      - ./config.json:/data/config.json                # rw — web UI saves settings
      - ./scenes:/data/scenes                          # rw — editable scene files
      - ./generated-scenes:/data/generated-scenes      # rw — cloned/detached scenes
    env_file:
      - /home/mba/secrets/pixdcon.env
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=weekly"
